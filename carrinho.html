<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho | Royal Champions Imports</title>

<link rel="icon" type="image/png" href="fotos chuteira/llogocerta2.0.png">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

.cart-icon{

    display:flex;

    align-items:center;

    gap:10px;

    text-decoration:none;

    background:#111;

    border:1px solid #2a2a2a;

    padding:10px 16px;

    border-radius:14px;

    transition:0.3s;

    color:white;

}

.cart-icon:hover{

    border-color:#c9a227;

    transform:translateY(-2px);

    box-shadow:0 0 15px rgba(201,162,39,0.15);

}

.cart-name{

    font-family:'Bebas Neue', sans-serif;

    letter-spacing:2px;

    font-size:24px;

    color:white;

}

#contador-carrinho{

    background:#c9a227;

    color:black;

    min-width:24px;

    height:24px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:13px;

    font-weight:bold;

}




*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
}

/* HEADER */

header{

    width:100%;
    height:90px;

    background:#000;

    border-bottom:1px solid #222;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 40px;

    position:sticky;
    top:0;
    z-index:999;
}

.logo-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.header-logo{
    width:60px;
    height:60px;
    object-fit:contain;
}

.logo{
    font-family:'Bebas Neue', sans-serif;
    font-size:42px;
    letter-spacing:3px;
}

.back{

    color:white;
    text-decoration:none;

    border:1px solid #333;

    padding:12px 20px;

    border-radius:12px;

    transition:0.3s;
}

.back:hover{
    background:white;
    color:black;
}

/* TITULO */

.topo{

    padding:60px 20px 20px;

    text-align:center;
}

.topo h1{

    font-family:'Bebas Neue', sans-serif;

    font-size:75px;

    letter-spacing:3px;

    margin-bottom:10px;
}

.topo p{
    color:#999;
    font-size:18px;
}

/* CARRINHO */

.cart-container{

    max-width:1300px;

    margin:auto;

    padding:40px;

    display:grid;

    grid-template-columns:2fr 1fr;

    gap:35px;
}

.cart-products{

    background:#0f0f0f;

    border:1px solid #1f1f1f;

    border-radius:25px;

    padding:30px;
}

.cart-title{

    font-family:'Bebas Neue', sans-serif;

    font-size:42px;

    letter-spacing:2px;

    margin-bottom:30px;
}

.cart-item{

    display:flex;

    align-items:center;

    gap:25px;

    padding:20px;

    border:1px solid #222;

    border-radius:20px;

    background:#080808;

    margin-bottom:20px;

    transition:0.3s;
}

.cart-item:hover{

    transform:translateY(-3px);

    border-color:#444;
}

.cart-item img{

    width:140px;
    height:140px;

    object-fit:cover;

    border-radius:18px;

    background:#111;
}

.item-info{
    flex:1;
}

.item-info h2{

    font-family:'Bebas Neue', sans-serif;

    font-size:38px;

    letter-spacing:2px;

    margin-bottom:10px;
}

.item-info p{

    color:#bdbdbd;

    margin-bottom:15px;
}

.price{

    font-size:28px;

    font-weight:bold;
}

.remove{

    background:#1c1c1c;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:12px;

    cursor:pointer;

    transition:0.3s;
}

.remove:hover{
    background:#2b2b2b;
}

/* RESUMO */

.summary{

    background:#0f0f0f;

    border:1px solid #1f1f1f;

    border-radius:25px;

    padding:30px;

    height:fit-content;

    position:sticky;
    top:120px;
}

.summary h2{

    font-family:'Bebas Neue', sans-serif;

    font-size:42px;

    letter-spacing:2px;

    margin-bottom:30px;
}

.summary-line{

    display:flex;

    justify-content:space-between;

    margin-bottom:20px;

    color:#ccc;

    font-size:18px;
}

.total{

    border-top:1px solid #222;

    padding-top:25px;

    margin-top:25px;

    font-size:28px;

    font-weight:bold;
}

.checkout{

    width:100%;

    padding:18px;

    border:none;

    border-radius:16px;

    background:white;

    color:black;

    font-weight:bold;

    font-size:17px;

    cursor:pointer;

    margin-top:30px;

    transition:0.3s;
}

.checkout:hover{

    background:#dcdcdc;

    transform:scale(1.02);
}

/* EMPTY */

.empty{

    text-align:center;

    padding:80px 20px;

    color:#777;
}

.empty h2{

    font-family:'Bebas Neue', sans-serif;

    font-size:50px;

    margin-bottom:10px;
}

/* FOOTER */

.footer-premium{

    background:#0a0a0a;

    padding:50px 30px 20px;

    border-top:1px solid #222;

    margin-top:50px;
}

.footer-copy{

    text-align:center;

    color:#666;

    font-size:14px;
}

/* RESPONSIVO */

@media(max-width:950px){

    .cart-container{

        grid-template-columns:1fr;

        padding:20px;
    }

    .cart-item{

        flex-direction:column;

        text-align:center;
    }

    .cart-item img{

        width:100%;
        height:250px;
    }

    .topo h1{
        font-size:55px;
    }

}

</style>

</head>

<body>

<header>

    <div class="logo-box">

        <img src="fotos chuteira/logo animaçao.png.png" class="header-logo">

        <div class="logo">
            ROYAL CHAMPIONS IMPORTS
        </div>

    </div>

    <a href="index.html" class="back">
        VOLTAR
    </a>
<a href="carrinho.html" class="cart-icon">

    🛒

    <span class="cart-name">
        CARRINHO
    </span>

    <span id="contador-carrinho">
        0
    </span>

</a>
</header>

<section class="topo">

    <h1>
        SEU CARRINHO
    </h1>

    <p>
        Confira seus produtos antes de finalizar a compra.
    </p>

</section>

<div class="cart-container">

    <!-- PRODUTOS -->

    <div class="cart-products">

        <div class="cart-title">
            PRODUTOS
        </div>

        <div id="cart-items"></div>

    </div>

    <!-- RESUMO -->

    <div class="summary">

        <h2>
            RESUMO
        </h2>

        <div class="summary-line">
            <span>Subtotal</span>
            <span id="subtotal">R$ 0,00</span>
        </div>

        <div class="summary-line">
            <span>Entrega</span>
            <span>Grátis</span>
        </div>

        <div class="summary-line total">
            <span>Total</span>
            <span id="total">R$ 0,00</span>
        </div>

        <button class="checkout" onclick="location.href='compra.html'">
            FINALIZAR COMPRA
        </button>

    </div>

</div>

<footer class="footer-premium">

    <div class="footer-copy">
        © 2026 Royal Champions Imports
    </div>

</footer>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

const cartItems = document.getElementById("cart-items");

function renderCarrinho(){

    cartItems.innerHTML = "";

    let total = 0;

    if(carrinho.length === 0){

        cartItems.innerHTML = `
        
        <div class="empty">

            <h2>CARRINHO VAZIO</h2>

            <p>Adicione produtos para continuar.</p>

        </div>

        `;

        document.getElementById("subtotal").innerText = "R$ 0,00";
        document.getElementById("total").innerText = "R$ 0,00";

        return;
    }

    carrinho.forEach((produto, index) => {

        total += parseFloat(produto.preco.replace(",", "."));

        cartItems.innerHTML += `

        <div class="cart-item">

            <img src="${produto.imagem}">

            <div class="item-info">

                <h2>${produto.nome}</h2>

                <p>Produto premium Royal Champions Imports</p>

                <div class="price">
                    R$ ${produto.preco}
                </div>

            </div>

            <button class="remove" onclick="removerItem(${index})">
                REMOVER
            </button>

        </div>

        `;

    });

    document.getElementById("subtotal").innerText =
    "R$ " + total.toFixed(2).replace(".", ",");

    document.getElementById("total").innerText =
    "R$ " + total.toFixed(2).replace(".", ",");

}

function removerItem(index){

    carrinho.splice(index, 1);

    localStorage.setItem("carrinho", JSON.stringify(carrinho));

    renderCarrinho();

}

renderCarrinho();

</script>
<script src="carrinho2.js"></script>
</body>

</html>
